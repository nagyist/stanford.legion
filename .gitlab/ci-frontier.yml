variables:
  OLCF_SERVICE_ACCOUNT: ums036_auser
  GIT_SUBMODULE_STRATEGY: recursive

.rocm571: &rocm571
  ROCM_VERSION: "5.7.1"

.rocm600: &rocm600
  ROCM_VERSION: "6.0.0"

.rocm613: &rocm613
  ROCM_VERSION: "6.1.3"

.rocm624: &rocm624
  ROCM_VERSION: "6.2.4"

.rocm631: &rocm631
  ROCM_VERSION: "6.3.1"

.rocm641: &rocm641
  ROCM_VERSION: "6.4.1"

.legion: &legion
  TEST_REGENT: "0"
  LEGION_WARNINGS_FATAL: "1"
  DEBUG: "0"

.regent: &regent
  TEST_LEGION_CXX: "0"
  TEST_REALM: "0"
  TEST_FUZZER: "0"
  NO_PRETTY: "1"
  CXXFLAGS: "-D__HIP_PLATFORM_AMD__"

.cmake: &cmake
  USE_CMAKE: "1"

.ctest: &ctest
  TEST_CTEST: "1"

.nodes1: &nodes1
  SCHEDULER_PARAMETERS: "-A UMS036 -t 0:30:00 -N 1 -n 1 -c 56 -p batch --exclusive"

.nodes2: &nodes2
  SCHEDULER_PARAMETERS: "-A UMS036 -t 0:30:00 -N 2 -n 2 -c 56 -p batch --exclusive"

.nodes1: &nodes1_1hr
  SCHEDULER_PARAMETERS: "-A UMS036 -t 1:00:00 -N 1 -n 1 -c 56 -p batch --exclusive"

.nodes2: &nodes2_1hr
  SCHEDULER_PARAMETERS: "-A UMS036 -t 1:00:00 -N 2 -n 2 -c 56 -p batch --exclusive"

.tokens: &tokens
  id_tokens:
    OLCF_ID_TOKEN:
      aud: https://code.olcf.ornl.gov

.tests: &tests
  script:
    - .gitlab/prep_script.sh
    - .gitlab/test_script.sh
  retry:
    max: 0
    when:
      - runner_system_failure
      - unknown_failure

stages:
  - test

